<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- nothingness — adaptive icon FOREGROUND, "noth" variant.
       flutter_launcher_icons wraps this in <inset android:inset="16%">,
       shrinking the drawable to the central 68% of the 108dp adaptive
       canvas. Letters pre-positioned so that after the inset they sit
       at ~38%/62% of the visible icon — a tight, larger 2×2 grid that
       reads safely inside circle and squircle launcher masks.
       Background is solid #000000 from adaptive_icon_background. -->
  <g fill="#FFFFFF"
     font-family="Noto Sans Mono, SF Mono, Consolas, monospace"
     font-weight="300"
     font-size="380"
     text-anchor="middle"
     dominant-baseline="central">
    <text x="332" y="362">n</text>
    <text x="692" y="362">o</text>
    <text x="332" y="662">t</text>
    <text x="692" y="662">h</text>
  </g>
</svg>
