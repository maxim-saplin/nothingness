<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- nothingness — "noth" corner-letters icon.
       Legacy / fullbleed variant. Lowercase n·o·t·h positioned at the
       corners of an invisible square. Pure black field, light-weight
       monospace — matches the v6_monk+ UI. -->
  <rect width="512" height="512" fill="#000000"/>
  <g fill="#FFFFFF"
     font-family="Noto Sans Mono, SF Mono, Consolas, monospace"
     font-weight="300"
     font-size="200"
     text-anchor="middle"
     dominant-baseline="central">
    <text x="155" y="175">n</text>
    <text x="357" y="175">o</text>
    <text x="155" y="337">t</text>
    <text x="357" y="337">h</text>
  </g>
</svg>
