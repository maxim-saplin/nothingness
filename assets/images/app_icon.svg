  <g fill="#FFFFFF"
     font-family="Noto Sans Mono, SF Mono, Consolas, monospace"
     font-weight="300"
     font-size="140"
     text-anchor="middle"
     dominant-baseline="central">
    <text x="128" y="148">V</text>
    <text x="384" y="148">O</text>
    <text x="128" y="364">I</text>
    <text x="384" y="364">D</text>
  </g>
</svg>
