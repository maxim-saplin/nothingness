<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- nothingness — VOID corner-letters icon.
       Legacy / fullbleed variant. Letters sit ~25% / 75% on each axis,
       implying the corners of an unseen square. Pure black field,
       monospace, light weight — matches the v6_monk+ UI. -->
